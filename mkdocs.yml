site_name: pytimeslice
site_description: Python library for rendering timeslice composite images
site_url: https://nxaden.github.io/pytimeslice/
repo_url: https://github.com/nxaden/pytimeslice
repo_name: nxaden/pytimeslice

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            inherited_members: true
            members_order: source
            merge_init_into_class: true
            parameter_headings: true
            separate_signature: true
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            show_source: false
            summary: true

markdown_extensions:
  - admonition
  - attr_list
  - codehilite
  - footnotes
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quickstart: quickstart.md
  - Guides:
      - Usage Examples: USAGE_EXAMPLES.md
  - API Reference:
      - Overview: api/index.md
      - Application Services: api/application.md
      - Domain: api/domain.md
      - Infrastructure: api/infrastructure.md
      - CLI: api/cli.md
